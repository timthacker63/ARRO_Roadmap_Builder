# ============================================================================
# ARRO ROADMAP — SINGLE SOURCE OF TRUTH
# Edit this file. Run generate_roadmap.py to produce both:
#   - ARRO_roadmap.html (internal — full detail, all releases, KPIs)
#   - ARRO_Roadmap_External.html (customer-facing — quarter cards, no KPIs)
#
# RULES THAT PREVENT DRIFT:
#   - audience: internal_only | both
#       "internal_only" features NEVER appear in the external output.
#       "both" features appear in BOTH outputs and require external_title +
#       external_summary — no external_summary means the generator skips it
#       externally rather than silently reusing internal language.
#   - external_title groups releases: every "both" feature sharing the same
#     external_title within the same quarter collapses into ONE external
#     card, regardless of how many internal releases/sprints it spans.
#   - continues_to replaces hand-typed "planned 26.X -> date" strings. The
#     generator computes that note. A release number with no matching date
#     anywhere in this file is a build error, not a silent typo.
#   - A feature CANNOT appear in the external output unless every quarter it
#     touches has at least one matching internal release entry. This is what
#     stops a forward promise (e.g. a "Phase 2") from existing externally
#     with no internal backing.
# ============================================================================

